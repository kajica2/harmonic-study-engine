<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      const _fetch = window.fetch;
      Object.defineProperty(window, 'fetch', {
        configurable: true,
        get: () => _fetch,
        set: (val) => {
          Object.defineProperty(window, 'fetch', {
            value: val,
            configurable: true,
            writable: true
          });
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
